<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <!-- Pure black terminal background -->
  <rect width="32" height="32" rx="4" fill="#000000"/>
  <!-- Sharp terminal prompt character '>' -->
  <path d="M6 8 L16 16 L6 24" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Blinking system block cursor -->
  <rect x="20" y="19" width="7" height="5" fill="#10b981"/>
</svg>
